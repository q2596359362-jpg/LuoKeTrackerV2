name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Create Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'WEOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        WEOF
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew -o gradlew
        chmod +x gradlew

    - name: Download OpenCV SDK and Build AAR
      run: |
        curl -L https://github.com/opencv/opencv/releases/download/4.9.0/opencv-4.9.0-android-sdk.zip -o opencv-sdk.zip
        unzip -q opencv-sdk.zip

        mkdir -p opencv_sdk/src/main/java
        mkdir -p opencv_sdk/src/main/res/values
        cp -r OpenCV-android-sdk/sdk/java/src/* opencv_sdk/src/main/java/
        if [ -d "OpenCV-android-sdk/sdk/java/res" ]; then
          cp -r OpenCV-android-sdk/sdk/java/res/* opencv_sdk/src/main/res/
        fi

        cat > opencv_sdk/src/main/AndroidManifest.xml << 'XEOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
        </manifest>
        XEOF

        cat > opencv_sdk/build.gradle << 'GEOF'
        plugins {
            id 'com.android.library'
        }
        android {
            namespace 'org.opencv'
            compileSdk 34
            defaultConfig { minSdk 26 }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            buildFeatures { buildConfig = true }
        }
        GEOF

        mkdir -p opencv_sdk/src/main/jniLibs
        for arch in arm64-v8a armeabi-v7a; do
          if [ -d "OpenCV-android-sdk/sdk/native/libs/$arch" ]; then
            cp -r "OpenCV-android-sdk/sdk/native/libs/$arch" opencv_sdk/src/main/jniLibs/
          fi
        done

        rm -rf OpenCV-android-sdk opencv-sdk.zip

    - name: Update settings.gradle
      run: sed -i "/include ':app'/a include ':opencv_sdk'" settings.gradle

    - name: Create dummy local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Build Debug APK
      run: |
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34"
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
