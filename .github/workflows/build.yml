name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Download and Setup OpenCV Android SDK
      run: |
        # Download OpenCV SDK
        curl -L https://github.com/opencv/opencv/releases/download/4.9.0/opencv-4.9.0-android-sdk.zip -o opencv-sdk.zip
        unzip -q opencv-sdk.zip
        
        # Create OpenCV module directory structure FIRST
        mkdir -p opencv_sdk/src/main/java/org/opencv
        mkdir -p opencv_sdk/src/main/jniLibs
        
        # Copy Java sources
        cp -r OpenCV-android-sdk/sdk/java/src/org/opencv/* opencv_sdk/src/main/java/org/opencv/
        
        # Copy native libraries for all architectures
        for arch in arm64-v8a armeabi-v7a x86 x86_64; do
          if [ -d "OpenCV-android-sdk/sdk/native/libs/$arch" ]; then
            cp -r "OpenCV-android-sdk/sdk/native/libs/$arch" opencv_sdk/src/main/jniLibs/
          fi
        done
        
        # Create AndroidManifest.xml for library module
        cat > opencv_sdk/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="org.opencv">
        </manifest>
        EOF
        
        # Cleanup
        rm -rf OpenCV-android-sdk opencv-sdk.zip

    - name: Create dummy local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Create gradlew
      run: |
        cat > gradlew << 'SCRIPT'
        #!/bin/sh
        exec gradle "$@"
        SCRIPT
        chmod +x gradlew

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Build Debug APK
      run: |
        cd $GITHUB_WORKSPACE
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34"
        ./gradlew assembleDebug 2>&1 || true
        if [ ! -f app/build/outputs/apk/debug/app-debug.apk ]; then
          gradle assembleDebug 2>&1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
