name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Create Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew -o gradlew
        chmod +x gradlew

    - name: Download OpenCV SDK AAR + Native Libs
      run: |
        # Download OpenCV Android SDK
        curl -L https://github.com/opencv/opencv/releases/download/4.9.0/opencv-4.9.0-android-sdk.zip -o opencv-sdk.zip
        unzip -q opencv-sdk.zip
        
        # Copy the pre-built AAR (contains Java classes + resources)
        mkdir -p app/libs
        cp OpenCV-android-sdk/sdk/java/openCVLibrary490-release.aar app/libs/opencv-490.aar
        
        # Copy native .so libraries into app's jniLibs
        mkdir -p app/src/main/jniLibs
        for arch in arm64-v8a armeabi-v7a; do
          if [ -d "OpenCV-android-sdk/sdk/native/libs/$arch" ]; then
            cp -r "OpenCV-android-sdk/sdk/native/libs/$arch" app/src/main/jniLibs/
          fi
        done
        
        # Cleanup
        rm -rf OpenCV-android-sdk opencv-sdk.zip

    - name: Create dummy local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Build Debug APK
      run: |
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34"
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
